<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>For You</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Italiana&family=Inter:wght@300;400&family=Dancing+Script:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --burgundy: oklch(18% 0.08 10);
        --ink: oklch(8% 0.04 10);
        --gold: oklch(72% 0.09 60);
        --gold-dim: oklch(55% 0.07 60);
        --cream: oklch(94% 0.02 70);
        --blush: oklch(78% 0.05 10);
        --parchment: oklch(22% 0.05 15);
        --serif: "Cormorant Garamond", serif;
        --accent: "Italiana", serif;
        --script: "Dancing Script", cursive;
        --body: "Inter", sans-serif;
      }
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: var(--ink);
      }
      body {
        font-family: var(--body);
        color: var(--cream);
      }

      #app {
        width: 100vw;
        height: 100vh;
        overflow: hidden;
        position: relative;
      }

      /* GRAIN OVERLAY */
      .grain {
        position: fixed;
        inset: 0;
        z-index: 100;
        pointer-events: none;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
        opacity: 0.35;
        mix-blend-mode: overlay;
      }

      /* EMBER PARTICLES */
      #embers {
        position: fixed;
        inset: 0;
        z-index: 5;
        pointer-events: none;
      }

      /* CHAPTER DOTS */
      #dots {
        position: fixed;
        right: 1.5rem;
        top: 50%;
        transform: translateY(-50%);
        z-index: 200;
        display: flex;
        flex-direction: column;
        gap: 10px;
        opacity: 0;
        transition: opacity 0.6s;
      }
      #dots.visible {
        opacity: 1;
      }
      .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        border: 1px solid var(--gold-dim);
        background: transparent;
        cursor: pointer;
        transition: all 0.3s;
      }
      .dot.active {
        background: var(--gold);
        border-color: var(--gold);
        transform: scale(1.3);
      }

      /* AUDIO PLAYER */
      #player {
        position: fixed;
        bottom: 1.5rem;
        right: 1.5rem;
        z-index: 200;
        display: flex;
        align-items: center;
        gap: 10px;
        background: rgba(10, 5, 6, 0.85);
        border: 1px solid rgba(212, 165, 116, 0.25);
        border-radius: 30px;
        padding: 8px 14px;
        opacity: 0;
        transition: opacity 0.8s;
        backdrop-filter: blur(8px);
      }
      #player.visible {
        opacity: 1;
      }
      #player button {
        background: none;
        border: none;
        color: var(--gold);
        cursor: pointer;
        font-size: 14px;
        padding: 0;
        line-height: 1;
        display: flex;
        align-items: center;
      }
      #song-title {
        font-family: var(--serif);
        font-size: 11px;
        color: var(--gold-dim);
        letter-spacing: 0.05em;
        max-width: 120px;
        overflow: hidden;
        white-space: nowrap;
        text-overflow: ellipsis;
      }
      #vol {
        width: 60px;
        accent-color: var(--gold);
      }

      /* CHAPTERS */
      .chapter {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        opacity: 0;
        pointer-events: none;
        transition: opacity 1.2s;
        padding: 2rem;
      }
      .chapter.active {
        opacity: 1;
        pointer-events: all;
        z-index: 10;
      }

      /* NEXT BUTTON */
      .next-btn {
        margin-top: 3rem;
        cursor: pointer;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
        opacity: 0;
        animation: fadeInUp 1s 0.5s forwards;
      }
      .next-btn span {
        font-family: var(--serif);
        font-size: 0.85rem;
        letter-spacing: 0.2em;
        color: var(--gold-dim);
        text-transform: uppercase;
      }
      .next-btn .chevron {
        color: var(--gold);
        font-size: 1.2rem;
        animation: bounce 2s infinite;
      }
      @keyframes bounce {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(5px);
        }
      }
      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* ─── CH 0: INVITATION ─── */
      #ch0 {
        background: radial-gradient(
          ellipse at center,
          #1a0510 0%,
          var(--ink) 70%
        );
      }
      #ch0 .name-reveal {
        font-family: var(--accent);
        font-size: clamp(2.5rem, 7vw, 5rem);
        color: var(--gold);
        letter-spacing: 0.15em;
        text-align: center;
        min-height: 1.2em;
      }
      #ch0 .tagline {
        font-family: var(--serif);
        font-style: italic;
        font-size: clamp(1rem, 2.5vw, 1.4rem);
        color: var(--cream);
        opacity: 0.7;
        margin-top: 1.2rem;
        letter-spacing: 0.05em;
      }
      #ch0 .sound-note {
        font-family: var(--body);
        font-size: 0.72rem;
        color: rgba(212, 165, 116, 0.45);
        letter-spacing: 0.12em;
        text-transform: uppercase;
        margin-top: 2rem;
      }
      #begin-btn {
        margin-top: 2.5rem;
        padding: 1rem 3rem;
        background: transparent;
        border: 1px solid var(--gold);
        color: var(--gold);
        font-family: var(--serif);
        font-size: 1.1rem;
        letter-spacing: 0.3em;
        text-transform: uppercase;
        cursor: pointer;
        transition: all 0.4s;
        opacity: 0;
        pointer-events: none;
        position: relative;
        overflow: hidden;
      }
      #begin-btn::before {
        content: "";
        position: absolute;
        inset: 0;
        background: var(--gold);
        transform: scaleX(0);
        transform-origin: left;
        transition: transform 0.4s;
        z-index: -1;
      }
      #begin-btn:hover::before {
        transform: scaleX(1);
      }
      #begin-btn:hover {
        color: var(--ink);
      }
      #begin-btn.show {
        opacity: 1;
        pointer-events: all;
        animation: glow-pulse 3s infinite;
      }
      @keyframes glow-pulse {
        0%,
        100% {
          box-shadow: 0 0 10px rgba(212, 165, 116, 0.2);
        }
        50% {
          box-shadow: 0 0 25px rgba(212, 165, 116, 0.5);
        }
      }

      /* ─── CH 1: GREETING ─── */
      #ch1 {
        background: radial-gradient(
          ellipse at 40% 50%,
          #2a0a14 0%,
          #0a0506 60%
        );
      }
      #ch1 .hb-text {
        font-family: var(--accent);
        font-size: clamp(2rem, 6vw, 4.5rem);
        color: var(--cream);
        letter-spacing: 0.1em;
        text-align: center;
        line-height: 1.15;
      }
      #ch1 .hb-text em {
        color: var(--gold);
        font-style: normal;
      }
      #ch1 .greeting-text {
        max-width: 560px;
        text-align: center;
        font-family: var(--serif);
        font-size: 1.15rem;
        font-style: italic;
        color: rgba(245, 235, 214, 0.8);
        margin-top: 2rem;
        line-height: 1.8;
        opacity: 0;
        animation: none;
      }
      #ch1.active .greeting-text {
        animation: fadeIn 1.5s 1.5s forwards;
      }
      @keyframes fadeIn {
        to {
          opacity: 1;
        }
      }

      /* ─── CH 2: TIMELINE ─── */
      #ch2 {
        background: linear-gradient(
          180deg,
          #0a0506 0%,
          #1a080d 50%,
          #0a0506 100%
        );
        overflow-y: auto;
        align-items: flex-start;
        justify-content: flex-start;
        padding: 4rem 2rem;
      }
      #ch2 .section-title {
        font-family: var(--accent);
        font-size: clamp(1.8rem, 5vw, 3.2rem);
        color: var(--gold);
        letter-spacing: 0.2em;
        margin-bottom: 3rem;
        width: 100%;
        text-align: center;
      }
      .timeline {
        position: relative;
        max-width: 700px;
        width: 100%;
        margin: 0 auto;
      }
      .tl-line {
        position: absolute;
        left: 50%;
        top: 0;
        bottom: 0;
        width: 1px;
        background: linear-gradient(
          180deg,
          transparent,
          var(--gold-dim) 10%,
          var(--gold-dim) 90%,
          transparent
        );
        transform: translateX(-50%);
      }
      .tl-item {
        display: flex;
        align-items: center;
        margin-bottom: 3rem;
        opacity: 0;
        transform: translateY(20px);
        transition: all 0.6s;
      }
      .tl-item.revealed {
        opacity: 1;
        transform: translateY(0);
      }
      .tl-item:nth-child(odd) {
        flex-direction: row-reverse;
      }
      .tl-dot {
        width: 14px;
        height: 14px;
        border-radius: 50%;
        border: 2px solid var(--gold);
        background: var(--ink);
        flex-shrink: 0;
        position: relative;
        z-index: 1;
        box-shadow: 0 0 12px rgba(212, 165, 116, 0.4);
      }
      .tl-content {
        flex: 1;
        padding: 0 2rem;
        max-width: 280px;
      }
      .tl-date {
        font-family: var(--body);
        font-size: 0.7rem;
        letter-spacing: 0.2em;
        color: var(--gold-dim);
        text-transform: uppercase;
      }
      .tl-text {
        font-family: var(--serif);
        font-size: 1.05rem;
        color: var(--cream);
        margin-top: 4px;
        line-height: 1.6;
      }
      .tl-img {
        width: 80px;
        height: 80px;
        border-radius: 50%;
        object-fit: cover;
        border: 2px solid var(--gold-dim);
        flex-shrink: 0;
      }
      .tl-placeholder {
        width: 80px;
        height: 80px;
        border-radius: 50%;
        background: var(--burgundy);
        border: 2px solid var(--gold-dim);
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: var(--serif);
        font-size: 1.5rem;
        color: var(--gold-dim);
      }

      /* ─── CH 3: ALBUM ─── */
      #ch3 {
        background: #0a0506;
        flex-direction: column;
        overflow-y: auto;
      }
      #ch3 .section-title {
        font-family: var(--accent);
        font-size: clamp(1.8rem, 5vw, 3.2rem);
        color: var(--gold);
        letter-spacing: 0.2em;
        margin-bottom: 1.5rem;
        text-align: center;
      }
      .album-modes {
        display: flex;
        gap: 1rem;
        margin-bottom: 2rem;
        justify-content: center;
      }
      .mode-btn {
        background: transparent;
        border: 1px solid rgba(212, 165, 116, 0.3);
        color: var(--gold-dim);
        font-family: var(--serif);
        font-size: 0.85rem;
        letter-spacing: 0.1em;
        padding: 6px 18px;
        cursor: pointer;
        border-radius: 20px;
        transition: all 0.3s;
      }
      .mode-btn.active,
      .mode-btn:hover {
        border-color: var(--gold);
        color: var(--gold);
        background: rgba(212, 165, 116, 0.08);
      }
      .album-container {
        width: 100%;
        max-width: 800px;
      }
      /* Slideshow */
      .slideshow {
        position: relative;
        width: 100%;
        aspect-ratio: 16/9;
        overflow: hidden;
      }
      .slide {
        position: absolute;
        inset: 0;
        opacity: 0;
        transition: opacity 1.2s;
      }
      .slide.active {
        opacity: 1;
      }
      .slide img,
      .slide .photo-placeholder {
        width: 100%;
        height: 100%;
        object-fit: cover;
        animation: kenburns 8s ease-in-out infinite alternate;
      }
      .photo-placeholder {
        background: var(--burgundy);
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: var(--serif);
        font-style: italic;
        color: var(--gold-dim);
        font-size: 1.2rem;
      }
      @keyframes kenburns {
        from {
          transform: scale(1);
        }
        to {
          transform: scale(1.06);
        }
      }
      .slide-caption {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        padding: 1.5rem;
        background: linear-gradient(transparent, rgba(10, 5, 6, 0.8));
        font-family: var(--serif);
        font-style: italic;
        color: var(--cream);
        font-size: 1rem;
      }
      /* Grid */
      .photo-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 6px;
      }
      .grid-photo {
        aspect-ratio: 1;
        overflow: hidden;
        cursor: pointer;
        position: relative;
      }
      .grid-photo img,
      .grid-photo .photo-placeholder {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: transform 0.5s;
      }
      .grid-photo:hover img,
      .grid-photo:hover .photo-placeholder {
        transform: scale(1.05);
      }
      /* Lightbox */
      .lightbox {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 300;
        background: rgba(5, 3, 4, 0.95);
        align-items: center;
        justify-content: center;
        flex-direction: column;
      }
      .lightbox.open {
        display: flex;
      }
      .lightbox img {
        max-width: 85vw;
        max-height: 75vh;
        object-fit: contain;
      }
      .lb-caption {
        font-family: var(--serif);
        font-style: italic;
        color: var(--cream);
        margin-top: 1rem;
        font-size: 1.05rem;
      }
      .lb-close {
        position: absolute;
        top: 2rem;
        right: 2rem;
        background: none;
        border: 1px solid var(--gold-dim);
        color: var(--gold);
        width: 36px;
        height: 36px;
        border-radius: 50%;
        cursor: pointer;
        font-size: 1rem;
      }

      /* ─── CH 4: VIDEO ─── */
      #ch4 {
        background: #050204;
      }
      .video-wrap {
        width: 100%;
        max-width: 800px;
        position: relative;
        box-shadow: 0 0 80px rgba(212, 165, 116, 0.12);
      }
      .video-wrap::before,
      .video-wrap::after {
        content: "";
        position: absolute;
        left: 0;
        right: 0;
        height: 60px;
        z-index: 2;
        pointer-events: none;
      }
      .video-wrap::before {
        top: 0;
        background: linear-gradient(rgba(5, 2, 4, 0.7), transparent);
      }
      .video-wrap::after {
        bottom: 0;
        background: linear-gradient(transparent, rgba(5, 2, 4, 0.7));
      }
      .video-wrap video,
      .video-placeholder {
        width: 100%;
        aspect-ratio: 16/9;
        display: block;
        background: #0a0506;
      }
      .video-placeholder {
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 1rem;
        font-family: var(--serif);
        color: var(--gold-dim);
      }
      .video-placeholder .play-icon {
        font-size: 3rem;
      }
      #ch4 .section-title {
        font-family: var(--accent);
        font-size: clamp(1.5rem, 4vw, 2.5rem);
        color: var(--gold);
        letter-spacing: 0.2em;
        margin-bottom: 1.5rem;
        text-align: center;
      }

      /* ─── CH 5: LETTER ─── */
      #ch5 {
        background: radial-gradient(ellipse at center, #200812 0%, #0a0506 70%);
        overflow-y: auto;
        align-items: center;
        justify-content: flex-start;
        padding: 4rem 2rem;
      }
      .letter-card {
        max-width: 640px;
        width: 100%;
        background: linear-gradient(135deg, #1e0a10 0%, #160608 100%);
        border: 1px solid rgba(212, 165, 116, 0.35);
        border-radius: 2px;
        padding: 3rem 3.5rem;
        box-shadow:
          0 0 40px rgba(212, 165, 116, 0.1),
          inset 0 0 60px rgba(42, 10, 20, 0.5);
        position: relative;
      }
      .letter-card::before {
        content: "";
        position: absolute;
        inset: 6px;
        border: 1px solid rgba(212, 165, 116, 0.12);
        border-radius: 2px;
        pointer-events: none;
      }
      .letter-dear {
        font-family: var(--serif);
        font-size: 1.25rem;
        color: var(--gold);
        margin-bottom: 1.5rem;
        font-style: italic;
      }
      #letter-body {
        font-family: var(--serif);
        font-size: 1.05rem;
        line-height: 1.9;
        color: rgba(245, 235, 214, 0.9);
        min-height: 100px;
      }
      .letter-cursor {
        display: inline-block;
        width: 2px;
        height: 1.1em;
        background: var(--gold);
        vertical-align: text-bottom;
        animation: blink 1s infinite;
      }
      @keyframes blink {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0;
        }
      }
      .letter-sig {
        font-family: var(--script);
        font-size: 2rem;
        color: var(--gold);
        margin-top: 2rem;
        text-align: right;
        opacity: 0;
        transition: opacity 1s;
      }
      .letter-sig.show {
        opacity: 1;
      }

      /* ─── CH 6: CAKE ─── */
      #ch6 {
        background: radial-gradient(ellipse at center, #200812 0%, #05020a 70%);
      }
      .cake-area {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 2rem;
      }
      #ch6 .section-title {
        font-family: var(--accent);
        font-size: clamp(1.8rem, 5vw, 3.2rem);
        color: var(--gold);
        letter-spacing: 0.2em;
        text-align: center;
      }
      .cake-hint {
        font-family: var(--serif);
        font-style: italic;
        color: var(--gold-dim);
        font-size: 0.9rem;
        letter-spacing: 0.05em;
      }
      .cake-svg-wrap {
        position: relative;
      }
      .candle-msg {
        position: absolute;
        top: -60px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(10, 5, 6, 0.9);
        border: 1px solid rgba(212, 165, 116, 0.3);
        color: var(--cream);
        font-family: var(--serif);
        font-style: italic;
        padding: 8px 16px;
        border-radius: 20px;
        font-size: 0.9rem;
        white-space: nowrap;
        opacity: 0;
        transition: opacity 0.5s;
        pointer-events: none;
      }
      .candle-msg.show {
        opacity: 1;
      }
      .final-wish {
        font-family: var(--accent);
        font-size: clamp(1.5rem, 4vw, 2.8rem);
        color: var(--gold);
        letter-spacing: 0.1em;
        text-align: center;
        opacity: 0;
        transform: translateY(20px);
        transition: all 1.2s;
        margin-top: 1rem;
      }
      .final-wish.show {
        opacity: 1;
        transform: translateY(0);
      }

      /* PETALS */
      #petals {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 50;
      }
      .petal {
        position: absolute;
        border-radius: 50% 0;
        width: 8px;
        height: 12px;
        opacity: 0;
        animation: fall linear forwards;
      }
      @keyframes fall {
        0% {
          opacity: 0.9;
          transform: translateY(-20px) rotate(0deg);
        }
        100% {
          opacity: 0;
          transform: translateY(110vh) rotate(720deg);
        }
      }

      /* TRANSITION OVERLAY */
      #overlay {
        position: fixed;
        inset: 0;
        background: var(--ink);
        z-index: 150;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.8s;
      }
      #overlay.fade-in {
        opacity: 1;
        pointer-events: all;
      }

      /* SCROLLBAR */
      ::-webkit-scrollbar {
        width: 4px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(212, 165, 116, 0.3);
        border-radius: 2px;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div class="grain"></div>
      <canvas id="embers"></canvas>
      <div id="petals"></div>
      <div id="overlay"></div>

      <!-- CHAPTER DOTS -->
      <div id="dots">
        <div class="dot active" data-ch="0" title="Invitation"></div>
        <div class="dot" data-ch="1" title="Greeting"></div>
        <div class="dot" data-ch="2" title="Our Story"></div>
        <div class="dot" data-ch="3" title="The Album"></div>
        <div class="dot" data-ch="4" title="Video Message"></div>
        <div class="dot" data-ch="5" title="Love Letter"></div>
        <div class="dot" data-ch="6" title="Make a Wish"></div>
      </div>

      <!-- AUDIO PLAYER -->
      <div id="player">
        <button id="play-btn">▶</button>
        <span id="song-title">Loading…</span>
        <input id="vol" type="range" min="0" max="1" step="0.05" value="0.7" />
      </div>

      <!-- ═══ CH 0: INVITATION ═══ -->
      <section class="chapter active" id="ch0">
        <div class="name-reveal" id="name-reveal"></div>
        <div class="tagline">Something is waiting for you…</div>
        <div class="sound-note">
          ✦ Best with sound on · Headphones, even better ✦
        </div>
        <button id="begin-btn">Begin</button>
      </section>

      <!-- ═══ CH 1: GREETING ═══ -->
      <section class="chapter" id="ch1">
        <div class="hb-text" id="hb-text"></div>
        <div class="greeting-text" id="greeting-text"></div>
        <div class="next-btn" onclick="goToChapter(2)">

      <!-- ═══ CH 2: TIMELINE ═══ -->
      <section class="chapter" id="ch2">
        <div class="section-title">Our Story</div>
        <div class="timeline" id="timeline">
          <div class="tl-line"></div>
        </div>
        <div
          class="next-btn"
          onclick="goToChapter(3)"
          style="
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
          "
        >
          <span>Open the next moment</span>
          <div class="chevron">❧</div>
        </div>
      </section>

      <!-- ═══ CH 3: ALBUM ═══ -->
      <section class="chapter" id="ch3">
        <div class="section-title">The Album</div>
        <div class="album-modes">
          <button class="mode-btn active" onclick="setAlbumMode('slide')">
            Slideshow
          </button>
          <button class="mode-btn" onclick="setAlbumMode('grid')">
            Gallery
          </button>
        </div>
        <div class="album-container" id="album-container"></div>
        <div
          class="next-btn"
          onclick="goToChapter(4)"
          style="
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 2rem;
          "
        >
          <span>Open the next moment</span>
          <div class="chevron">❧</div>
        </div>
      </section>

      <!-- LIGHTBOX -->
      <div class="lightbox" id="lightbox">
        <button class="lb-close" onclick="closeLightbox()">✕</button>
        <img id="lb-img" src="" alt="" />
        <div class="lb-caption" id="lb-caption"></div>
      </div>

      <!-- ═══ CH 4: VIDEO ═══ -->
      <section class="chapter" id="ch4">
        <div class="section-title">A Message for You</div>
        <div class="video-wrap" id="video-wrap"></div>
        <!-- <video controls width="600px" height="600px" src="./assests/Diablo_480P.mp4"></video> -->
        <div class="next-btn" onclick="goToChapter(5)">
          <span>Open the next moment</span>
          <div class="chevron">❧</div>
        </div>
      </section>

      <!-- ═══ CH 5: LETTER ═══ -->
      <section class="chapter" id="ch5">
        <div class="letter-card">
          <div class="letter-dear" id="letter-dear"></div>
          <div id="letter-body"></div>
          <div class="letter-sig" id="letter-sig"></div>
        </div>
        <div
          class="next-btn"
          onclick="goToChapter(6)"
          style="
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 2rem;
          "
        >
          <span>Open the next moment</span>
          <div class="chevron">❧</div>
        </div>
      </section>

      <!-- ═══ CH 6: WISH ═══ -->
      <section class="chapter" id="ch6">
        <div class="cake-area">
          <div class="section-title">Make a Wish</div>
          <div class="cake-hint">Tap each candle to blow it out…</div>
          <div class="cake-svg-wrap">
            <div class="candle-msg" id="candle-msg"></div>
            <svg
              id="cake-svg"
              width="320"
              height="280"
              viewBox="0 0 320 280"
              xmlns="http://www.w3.org/2000/svg"
            ></svg>
          </div>
          <div class="final-wish" id="final-wish"></div>
        </div>
      </section>
    </div>

    <script>
      /* ═══════════════════ CONFIG ═══════════════════ */
      const CONFIG = {
        name: "My Love",
        nickname: "Darling",
        greeting:
          "Every year the world turns a little more beautiful — because you are in it. Today is yours, entirely.",
        song: {
          url: "./assests/Buju-LadiPoe-Ft-Feeling-1-(TrendyBeatz.com).mp3",
          title: "Feeling",
        },
        video: { url: "./assests/FCCF3483.MP4", poster: "" },
        timeline: [
          {
            date: "The Beginning",
            text: "The moment everything changed — when I first saw you.",
          },
          {
            date: "A Perfect Night",
            text: "The nights when we are both wrapped together in love.",
          },
          {
            date: "Through the Storms",
            text: "We held each other through the hard parts and came out stronger.",
          },
          {
            date: "A Thousand Small Moments",
            text: "Seeing you happy and full of smiles are my favourite days.",
          },
          {
            date: "Today",
            text: "Another year, another reason to be endlessly grateful for you.",
          },
        ],
        photos: [
          {
            src: "./assests/IMG_E7369.JPG",
            caption: "The look that started everything.",
          },
          {
            src: "./assests/2nd.JPG",
            caption: "Your laughter, my favourite sound.",
          },
          {
            src: "./assests/3rd.JPG",
            caption: "The quiet moments I treasure most.",
          },
          {
            src: "./assests/5th.jpg",
            caption: "Caught mid-thought,still my favourite view.",
          },
          { src: "", caption: "Where we belong — together." },
          {
            src: "./assests/last.JPG",
            caption: "Every day with you is a gift.",
          },
        ],
        letter: {
          dear: "My dearest,",
          paragraphs: [
            "I have been trying, for days now, to find the right words for this. Each time I sit down to write, I find that words runs out before the feeling does which tells you something about what you mean to me.",
            "I love the way you think the careful, curious way you turn a problem over until it reveals itself. I love the sound of your voice when you are talking about something that excites you.",
            "I love your strength, Babe. The kind that doesn't annouce itself. The kind that's grntle but unshakable underneath. I love how you hold me at night like i'm both precious and known, like there is nowhwere else your arms would rayher be.",
            "My Aro Mate, yes i love when we have our little fun time together, it makes me so happy just by being around you.My LALA KING.",
            "This year, like every year before it, I have watched you grow more fully into yourself, and I have been so proud to stand beside you while you did. The courage it takes to keep becoming who you are I see it, even when you cannot. Especially now.",
            "On this day, of all days, I want you to know: you are loved beyond what I know how to say. Beyond what fits inside a letter, or a year, or a lifetime of trying to show you. But I intend to keep trying today, tomorrow, in every small and enormous way I know how.",
            "Happy birthday, my love. The world is lucky you were born.",
          ],
          signature: "Forever yours ALWAYS- BABY GIRL.",
        },
        candles: [
          "You are the softest kind of brave.",
          "Every room becomes warmer when you enter.",
          "Your smile rewrites the whole day.",
          "You are someone's most beautiful answered prayer.",
          "I would choose you in every version of this life.",
        ],
        finalWish: "Forever yours.",
      };

      /* ═══════════════════ STATE ═══════════════════ */
      let currentChapter = 0;
      let audio = null;
      let playing = false;
      let albumMode = "slide";
      let slideInterval = null;
      let currentSlide = 0;
      let candlesOut = 0;

      /* ═══════════════════ EMBER PARTICLES ═══════════════════ */
      const canvas = document.getElementById("embers");
      const ctx = canvas.getContext("2d");
      let embers = [];
      function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      }
      resizeCanvas();
      window.addEventListener("resize", resizeCanvas);

      function spawnEmber() {
        const density = currentChapter > 0 ? 3 : 1;
        for (let i = 0; i < density; i++) {
          embers.push({
            x: Math.random() * canvas.width,
            y: canvas.height + 10,
            vx: (Math.random() - 0.5) * 0.8,
            vy: -(Math.random() * 1.5 + 0.5),
            size: Math.random() * 2.5 + 0.5,
            alpha: Math.random() * 0.7 + 0.3,
            life: 1,
          });
        }
      }
      function drawEmbers() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        embers = embers.filter((e) => e.life > 0);
        embers.forEach((e) => {
          e.x += e.vx + Math.sin(Date.now() * 0.001 + e.y) * 0.3;
          e.y += e.vy;
          e.life -= 0.004;
          e.alpha = e.life * 0.8;
          ctx.beginPath();
          ctx.arc(e.x, e.y, e.size, 0, Math.PI * 2);
          const g = ctx.createRadialGradient(e.x, e.y, 0, e.x, e.y, e.size * 2);
          g.addColorStop(0, `rgba(212,165,116,${e.alpha})`);
          g.addColorStop(1, `rgba(212,100,60,0)`);
          ctx.fillStyle = g;
          ctx.fill();
        });
        requestAnimationFrame(drawEmbers);
      }
      setInterval(spawnEmber, 120);
      drawEmbers();

      /* ═══════════════════ CHAPTER NAVIGATION ═══════════════════ */
      function goToChapter(n) {
        if (n === currentChapter) return;
        const overlay = document.getElementById("overlay");
        overlay.classList.add("fade-in");
        setTimeout(() => {
          document
            .querySelectorAll(".chapter")
            .forEach((c) => c.classList.remove("active"));
          document.getElementById("ch" + n).classList.add("active");
          document
            .querySelectorAll(".dot")
            .forEach((d, i) => d.classList.toggle("active", i === n));
          currentChapter = n;
          window.scrollTo(0, 0);
          overlay.classList.remove("fade-in");
          onChapterEnter(n);
        }, 700);
      }

      document.querySelectorAll(".dot").forEach((d) => {
        d.addEventListener("click", () => goToChapter(parseInt(d.dataset.ch)));
      });

      /* ═══════════════════ AUDIO ═══════════════════ */
      function initAudio() {
        if (audio) return;
        audio = new Audio();
        audio.loop = true;
        audio.volume = 0.7;
        if (CONFIG.song.url) audio.src = CONFIG.song.url;
        document.getElementById("song-title").textContent = CONFIG.song.title;
        document
          .getElementById("play-btn")
          .addEventListener("click", togglePlay);
        document.getElementById("vol").addEventListener("input", (e) => {
          audio.volume = e.target.value;
        });
        if (CONFIG.song.url) {
          audio.play().then(() => {
            playing = true;
            document.getElementById("play-btn").textContent = "⏸";
          });
        }
      }
      function togglePlay() {
        if (!audio) return;
        if (playing) {
          audio.pause();
          document.getElementById("play-btn").textContent = "▶";
        } else {
          audio.play();
          document.getElementById("play-btn").textContent = "⏸";
        }
        playing = !playing;
      }

      /* ═══════════════════ CH 0: INVITATION ═══════════════════ */
      (function initCh0() {
        const el = document.getElementById("name-reveal");
        const name = CONFIG.name;
        let i = 0;
        setTimeout(() => {
          const t = setInterval(() => {
            if (i >= name.length) {
              clearInterval(t);
              setTimeout(() => {
                document.getElementById("begin-btn").classList.add("show");
              }, 600);
              return;
            }
            el.textContent += name[i++];
          }, 120);
        }, 800);
        document.getElementById("begin-btn").addEventListener("click", () => {
          initAudio();
          document.getElementById("player").classList.add("visible");
          document.getElementById("dots").classList.add("visible");
          goToChapter(1);
        });
      })();

      /* ═══════════════════ CH 1: GREETING ═══════════════════ */
      function enterCh1() {
        const hb = document.getElementById("hb-text");
        hb.innerHTML = "";
        const full = `Happy Birthday, <em>${CONFIG.name}</em>`;
        hb.innerHTML = full;
        hb.style.opacity = "0";
        hb.style.transition = "none";
        setTimeout(() => {
          hb.style.transition = "opacity 1.2s";
          hb.style.opacity = "1";
        }, 100);
        document.getElementById("greeting-text").textContent = CONFIG.greeting;
      }

      /* ═══════════════════ CH 2: TIMELINE ═══════════════════ */
      function buildTimeline() {
        const tl = document.getElementById("timeline");
        const items = tl.querySelectorAll(".tl-item");
        if (items.length > 0) return;
        CONFIG.timeline.forEach((m, i) => {
          const item = document.createElement("div");
          item.className = "tl-item";
          const placeholder = `<div class="tl-placeholder">✦</div>`;
          const imgEl = m.image
            ? `<img class="tl-img" src="${m.image}" alt="">`
            : placeholder;
          item.innerHTML = `
      <div class="tl-content">
        <div class="tl-date">${m.date}</div>
        <div class="tl-text">${m.text}</div>
      </div>
      <div class="tl-dot"></div>
      ${imgEl}
    `;
          tl.appendChild(item);
        });
      }
      function revealTimeline() {
        const items = document.querySelectorAll(".tl-item");
        items.forEach((item, i) => {
          setTimeout(() => item.classList.add("revealed"), i * 300);
        });
      }

      /* ═══════════════════ CH 3: ALBUM ═══════════════════ */
      function buildAlbum() {
        renderAlbum("slide");
      }
      function renderAlbum(mode) {
        const container = document.getElementById("album-container");
        document.querySelectorAll(".mode-btn").forEach((b, i) => {
          b.classList.toggle(
            "active",
            (i === 0 && mode === "slide") || (i === 1 && mode === "grid"),
          );
        });
        if (mode === "slide") {
          clearInterval(slideInterval);
          container.innerHTML = `<div class="slideshow" id="slideshow"></div>`;
          const ss = document.getElementById("slideshow");
          CONFIG.photos.forEach((p, i) => {
            const slide = document.createElement("div");
            slide.className = "slide" + (i === 0 ? " active" : "");
            slide.innerHTML = p.src
              ? `<img src="${p.src}" alt="${p.caption}"><div class="slide-caption">${p.caption}</div>`
              : `<div class="photo-placeholder">${p.caption}</div>`;
            ss.appendChild(slide);
          });
          currentSlide = 0;
          slideInterval = setInterval(() => {
            const slides = document.querySelectorAll(".slide");
            slides[currentSlide].classList.remove("active");
            currentSlide = (currentSlide + 1) % slides.length;
            slides[currentSlide].classList.add("active");
          }, 4000);
        } else {
          clearInterval(slideInterval);
          container.innerHTML = `<div class="photo-grid" id="photo-grid"></div>`;
          const grid = document.getElementById("photo-grid");
          CONFIG.photos.forEach((p, i) => {
            const cell = document.createElement("div");
            cell.className = "grid-photo";
            cell.onclick = () => openLightbox(p);
            cell.innerHTML = p.src
              ? `<img src="${p.src}" alt="${p.caption}">`
              : `<div class="photo-placeholder">${p.caption}</div>`;
            grid.appendChild(cell);
          });
        }
      }
      function setAlbumMode(m) {
        albumMode = m;
        renderAlbum(m);
      }
      function openLightbox(p) {
        const lb = document.getElementById("lightbox");
        document.getElementById("lb-img").src = p.src || "";
        document.getElementById("lb-img").style.display = p.src ? "" : "none";
        document.getElementById("lb-caption").textContent = p.caption;
        lb.classList.add("open");
      }
      function closeLightbox() {
        document.getElementById("lightbox").classList.remove("open");
      }

      /* ═══════════════════ CH 4: VIDEO ═══════════════════ */
      function buildVideo() {
        const wrap = document.getElementById("video-wrap");
        if (CONFIG.video.url) {
          wrap.innerHTML = `<video controls ${CONFIG.video.poster ? `poster="${CONFIG.video.poster}"` : ""} style="width:100%;aspect-ratio:16/9;display:block;"><source src="${CONFIG.video.url}">Your browser does not support video.</video>`;
        } else {
          wrap.innerHTML = `<div class="video-placeholder"><div class="play-icon">▶</div><div style="font-family:var(--serif);font-style:italic;color:var(--gold-dim);font-size:1rem;">Your video message will appear here<br><small style="font-size:0.8rem;opacity:0.6;">Add video.url to the config</small></div></div>`;
        }
      }

      /* ═══════════════════ CH 5: LETTER ═══════════════════ */
      let letterTyping = false;
      function startLetter() {
        if (letterTyping) return;
        letterTyping = true;
        document.getElementById("letter-dear").textContent = CONFIG.letter.dear;
        const body = document.getElementById("letter-body");
        body.innerHTML = '<span class="letter-cursor"></span>';
        const full = CONFIG.letter.paragraphs.join("\n\n");
        let i = 0;
        const cursor = body.querySelector(".letter-cursor");
        const type = () => {
          if (i >= full.length) {
            cursor.remove();
            const sig = document.getElementById("letter-sig");
            sig.textContent = CONFIG.letter.signature;
            setTimeout(() => sig.classList.add("show"), 300);
            return;
          }
          const ch = full[i++];
          const t = document.createTextNode(ch === "\n" ? "" : ch);
          if (ch === "\n" && full[i] === "\n") {
            body.insertBefore(document.createElement("br"), cursor);
            body.insertBefore(document.createElement("br"), cursor);
            i++;
          } else body.insertBefore(t, cursor);
          setTimeout(type, 14);
        };
        type();
      }

      /* ═══════════════════ CH 6: CAKE ═══════════════════ */
      function buildCake() {
        candlesOut = 0;
        const svg = document.getElementById("cake-svg");
        svg.innerHTML = "";
        const W = 320,
          H = 280;
        // base
        const base = document.createElementNS(
          "http://www.w3.org/2000/svg",
          "ellipse",
        );
        base.setAttribute("cx", 160);
        base.setAttribute("cy", 220);
        base.setAttribute("rx", 120);
        base.setAttribute("ry", 28);
        base.setAttribute("fill", "#3a1020");
        svg.appendChild(base);
        const body = document.createElementNS(
          "http://www.w3.org/2000/svg",
          "rect",
        );
        body.setAttribute("x", 40);
        body.setAttribute("y", 160);
        body.setAttribute("width", 240);
        body.setAttribute("height", 62);
        body.setAttribute("fill", "#4a1828");
        body.setAttribute("rx", "4");
        svg.appendChild(body);
        const top = document.createElementNS(
          "http://www.w3.org/2000/svg",
          "ellipse",
        );
        top.setAttribute("cx", 160);
        top.setAttribute("cy", 162);
        top.setAttribute("rx", 120);
        top.setAttribute("ry", 26);
        top.setAttribute("fill", "#5a2030");
        svg.appendChild(top);
        // frosting drips
        [80, 120, 160, 200, 240].forEach((x) => {
          const drip = document.createElementNS(
            "http://www.w3.org/2000/svg",
            "path",
          );
          drip.setAttribute("d", `M${x},162 Q${x + 5},180 ${x - 2},190`);
          drip.setAttribute("stroke", "rgba(245,235,214,0.4)");
          drip.setAttribute("stroke-width", "4");
          drip.setAttribute("fill", "none");
          drip.setAttribute("stroke-linecap", "round");
          svg.appendChild(drip);
        });
        // candles
        const cxs = [80, 112, 144, 176, 208];
        cxs.forEach((cx, i) => {
          const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
          g.setAttribute("class", "node");
          g.setAttribute("id", "candle-" + i);
          g.style.cursor = "pointer";
          g.addEventListener("click", () => blowCandle(i));
          // stick
          const stick = document.createElementNS(
            "http://www.w3.org/2000/svg",
            "rect",
          );
          stick.setAttribute("x", cx - 5);
          stick.setAttribute("y", 118);
          stick.setAttribute("width", 10);
          stick.setAttribute("height", 44);
          stick.setAttribute("fill", `hsl(${30 + i * 40},60%,55%)`);
          stick.setAttribute("rx", "2");
          g.appendChild(stick);
          // flame
          const flame = document.createElementNS(
            "http://www.w3.org/2000/svg",
            "ellipse",
          );
          flame.setAttribute("cx", cx);
          flame.setAttribute("cy", 110);
          flame.setAttribute("rx", 5);
          flame.setAttribute("ry", 10);
          flame.setAttribute("fill", "#f5c060");
          flame.setAttribute("id", "flame-" + i);
          flame.style.animation = `flicker-${i} ${1.2 + i * 0.15}s ease-in-out infinite alternate`;
          g.appendChild(flame);
          // glow
          const glow = document.createElementNS(
            "http://www.w3.org/2000/svg",
            "ellipse",
          );
          glow.setAttribute("cx", cx);
          glow.setAttribute("cy", 110);
          glow.setAttribute("rx", 12);
          glow.setAttribute("ry", 16);
          glow.setAttribute("fill", "rgba(245,192,96,0.15)");
          glow.setAttribute("id", "glow-" + i);
          g.insertBefore(glow, flame);
          svg.appendChild(g);
        });
        // flicker animations
        const style = document.createElementNS(
          "http://www.w3.org/2000/svg",
          "style",
        );
        let css = "";
        for (let i = 0; i < 5; i++)
          css += `@keyframes flicker-${i}{0%{transform:scaleX(1) scaleY(1);}100%{transform:scaleX(0.85) scaleY(1.1) translateY(-2px);}}`;
        style.textContent = css;
        svg.insertBefore(style, svg.firstChild);
      }

      function blowCandle(i) {
        if (
          document.getElementById("flame-" + i).getAttribute("data-out") ===
          "true"
        )
          return;
        document.getElementById("flame-" + i).setAttribute("data-out", "true");
        document.getElementById("flame-" + i).style.opacity = "0";
        document.getElementById("flame-" + i).style.transition = "opacity 0.5s";
        document.getElementById("glow-" + i).style.opacity = "0";
        document.getElementById("glow-" + i).style.transition = "opacity 0.5s";
        candlesOut++;
        const msg = document.getElementById("candle-msg");
        msg.textContent = CONFIG.candles[i] || "";
        msg.classList.add("show");
        setTimeout(() => msg.classList.remove("show"), 3000);
        if (candlesOut === 5) setTimeout(allCandlesOut, 1500);
      }
      function allCandlesOut() {
        spawnPetals();
        const wish = document.getElementById("final-wish");
        wish.textContent = CONFIG.finalWish;
        setTimeout(() => wish.classList.add("show"), 1000);
      }
      function spawnPetals() {
        const container = document.getElementById("petals");
        const colors = ["#e8b4b8", "#d4a574", "#f5ebd6", "#c87090", "#f0c060"];
        for (let i = 0; i < 80; i++) {
          setTimeout(() => {
            const p = document.createElement("div");
            p.className = "petal";
            p.style.left = Math.random() * 100 + "vw";
            p.style.background =
              colors[Math.floor(Math.random() * colors.length)];
            p.style.animationDuration = Math.random() * 3 + 3 + "s";
            p.style.animationDelay = "0s";
            p.style.width = Math.random() * 8 + 4 + "px";
            p.style.height = Math.random() * 12 + 6 + "px";
            container.appendChild(p);
            setTimeout(() => p.remove(), 7000);
          }, i * 60);
        }
      }

      /* ═══════════════════ CHAPTER ENTER HOOKS ═══════════════════ */
      function onChapterEnter(n) {
        if (n === 1) enterCh1();
        if (n === 2) {
          buildTimeline();
          setTimeout(revealTimeline, 300);
        }
        if (n === 3) buildAlbum();
        if (n === 4) buildVideo();
        if (n === 5) setTimeout(startLetter, 500);
        if (n === 6) buildCake();
      }
    </script>
  </body>
</html>
